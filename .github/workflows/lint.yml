name: Count INO Files

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  count-ino-files:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Count .ino files
        run: python count_ino.py
